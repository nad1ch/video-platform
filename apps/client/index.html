<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/favicon.ico?v=3" sizes="any" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png?v=3" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png?v=3" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png?v=3" />
    <!--
      SERP-only icon for Google search results. Browsers pick the closest size for the tab
      (16x16 / 32x32 above), so this larger PNG with a baked-in black background only shows up
      where Google prefers a 48-multiple icon (it ignores the small transparent PNGs that were
      otherwise composited onto Google's white SERP chip).
    -->
    <link rel="icon" type="image/png" sizes="192x192" href="/favicon-192x192.png?v=3" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0b0317" />
    <!-- SEO: page <title> targets SERP; og/twitter titles may be shorter for share cards. Keep meta description aligned with JSON-LD `description`. -->
    <title>StreamAssist – Video Calls for Streamers &amp; OBS Overlay</title>
    <meta
      name="description"
      content="StreamAssist is a platform for streamers (stream assist tools): video calls, chat games, and overlays."
    />
    <link rel="canonical" href="https://app.streamassist.net/" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="StreamAssist" />
    <meta property="og:locale" content="en_US" />
    <meta property="og:title" content="StreamAssist" />
    <meta property="og:description" content="Video calls, games, and overlays for streamers" />
    <meta property="og:url" content="https://app.streamassist.net/" />
    <meta property="og:image" content="https://app.streamassist.net/og-app.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta
      property="og:image:alt"
      content="StreamAssist — video calls, chat games, and stream overlay for live creators"
    />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="StreamAssist" />
    <meta name="twitter:description" content="Video calls, games, and overlays for streamers" />
    <meta name="twitter:image" content="https://app.streamassist.net/og-app.png" />
    <meta
      name="twitter:image:alt"
      content="StreamAssist — video calls, chat games, and stream overlay for live creators"
    />
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "StreamAssist",
        "url": "https://app.streamassist.net/",
        "applicationCategory": "EntertainmentApplication",
        "operatingSystem": "Web",
        "description": "StreamAssist is a platform for streamers (stream assist tools): video calls, chat games, and overlays.",
        "offers": {
          "@type": "Offer",
          "price": "0",
          "priceCurrency": "USD"
        },
        "publisher": {
          "@type": "Organization",
          "name": "StreamAssist",
          "url": "https://app.streamassist.net/"
        }
      }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Abril+Fatface&family=Arbutus&family=Climate+Crisis:YEAR@1979&family=Coda+Caption:wght@800&family=Marmelad&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Titan+One&display=swap"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Abril+Fatface&family=Arbutus&family=Climate+Crisis:YEAR@1979&family=Coda+Caption:wght@800&family=Marmelad&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Titan+One&display=swap"
      rel="stylesheet"
    />
    <noscript>
      <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Abril+Fatface&family=Arbutus&family=Climate+Crisis:YEAR@1979&family=Coda+Caption:wght@800&family=Marmelad&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Titan+One&display=swap"
      />
    </noscript>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
