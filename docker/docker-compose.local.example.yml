# =============================================================================
# LOCAL MACHINE ONLY — not for staging/production
# =============================================================================
# Working copy is GITIGNORED. Bootstrap once:
#   cp docker/docker-compose.local.example.yml docker/docker-compose.local.yml
#   cp apps/server/Dockerfile.local.example apps/server/Dockerfile.local
#   cp apps/server/.env.local.example apps/server/.env.local
#   cp docker/.env.example docker/.env
#
# Postgres + API with bind mounts. mediasoup UDP 55000–55100 (often avoids Windows reserved 49xxx/50xxx).
#
# From repo root:
#   docker compose -f docker/docker-compose.local.yml --profile turn up --build
#
# Prisma (first time — DB must be up):
#   docker compose -f docker/docker-compose.local.yml exec server npx prisma migrate deploy
# =============================================================================

name: video-platform-local

services:
  db:
    image: postgres:15-alpine
    container_name: video-platform-postgres-local
    restart: unless-stopped
    environment:
      POSTGRES_USER: streamassist
      POSTGRES_PASSWORD: streamassist
      POSTGRES_DB: streamassist
    ports:
      - "5432:5432"
    volumes:
      - pgdata_local:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U streamassist -d streamassist"]
      interval: 3s
      timeout: 5s
      retries: 20

  server:
    build:
      context: ..
      dockerfile: apps/server/Dockerfile.local
    container_name: video-platform-server-local
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "3000:3000"
      - "55000-55100:55000-55100/udp"
    volumes:
      - ../apps/server:/app
      - server_node_modules_local:/app/node_modules
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://streamassist:streamassist@db:5432/streamassist
      ADMIN_EMAILS: admin@local.streamassist
      NADLE_JWT_SECRET: local-docker-dev-secret-min-16-chars
      AUTH_JWT_SECRET: local-docker-dev-secret-min-16-chars
      # Override in docker/.env when you open the SPA at http://<LAN-IP>:5173 (CORS / redirects).
      NADLE_CLIENT_ORIGIN: ${NADLE_CLIENT_ORIGIN:-http://localhost:5173}
      TWITCH_AUTH_REDIRECT_URI: http://localhost:3000/api/auth/twitch/callback
      GOOGLE_OAUTH_REDIRECT_URI: http://localhost:3000/api/auth/google/callback
      # Docker: set to host LAN IP if remote video is black while signaling works (see docker/README.md).
      MEDIASOUP_ANNOUNCED_ADDRESS: ${MEDIASOUP_ANNOUNCED_ADDRESS:-127.0.0.1}
      MEDIASOUP_RTC_MIN_PORT: "55000"
      MEDIASOUP_RTC_MAX_PORT: "55100"
      ICE_SERVERS_JSON: ${ICE_SERVERS_JSON:-}
    command: npm run dev

  coturn:
    profiles: ["turn"]
    image: coturn/coturn:4.6.2
    container_name: video-platform-coturn-local
    ports:
      - "3478:3478/udp"
      - "3478:3478/tcp"
      - "5349:5349/tcp"
      - "49160-49200:49160-49200/udp"
    command:
      - -n
      - --log-file=stdout
      - --listening-port=3478
      - --tls-listening-port=5349
      - --min-port=49160
      - --max-port=49200
      - --fingerprint
      - --lt-cred-mech
      - --user=webrtc:change-me
      - --realm=video-platform
      - --no-cli

volumes:
  pgdata_local:
  server_node_modules_local:
