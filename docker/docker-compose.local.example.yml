# =============================================================================
# LOCAL MACHINE ONLY — not for staging/production
# =============================================================================
# Working copy is GITIGNORED. Bootstrap once:
#   cp docker/docker-compose.local.example.yml docker/docker-compose.local.yml
#   cp apps/server/Dockerfile.local.example apps/server/Dockerfile.local
#   cp apps/server/.env.local.example apps/server/.env.local
#
# Postgres + API with bind mounts (hot reload). Published :5432 for host Prisma / GUI tools.
#
# Twitch OAuth: copy docker/.env.example → docker/.env and set TWITCH_CLIENT_ID / TWITCH_CLIENT_SECRET.
#
# From repo root:
#   docker compose -f docker/docker-compose.local.yml up -d
#
# Prisma (host Node, first time — DB must be up):
#   cd apps/server && npm run db:migrate:dev && npm run db:seed
#
# If the API dies with Cannot find module 'wordle-core' after changing Dockerfile.local,
# reset the server node_modules volume and recreate (compose project name is usually the
# compose file’s parent folder, e.g. docker → volume docker_server_node_modules_local):
#   docker compose -f docker/docker-compose.local.yml rm -sf server
#   docker volume rm docker_server_node_modules_local
#   docker compose -f docker/docker-compose.local.yml up -d --build server
# =============================================================================

services:
  db:
    image: postgres:15-alpine
    container_name: video-platform-postgres-local
    restart: unless-stopped
    environment:
      POSTGRES_USER: streamassist
      POSTGRES_PASSWORD: streamassist
      POSTGRES_DB: streamassist
    ports:
      - "5432:5432"
    volumes:
      - pgdata_local:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U streamassist -d streamassist"]
      interval: 3s
      timeout: 5s
      retries: 20

  server:
    build:
      # Repo root so `packages/wordle-core` is available for apps/server (file:../../packages/wordle-core).
      context: ..
      dockerfile: apps/server/Dockerfile.local
    container_name: video-platform-server-local
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "3000:3000"
      # Narrower UDP range avoids Windows "bind: forbidden by its access permissions" on large blocks.
      # Must match MEDIASOUP_RTC_* below and apps/server createWorker (env overrides defaults).
      - "52000-52199:52000-52199/udp"
    volumes:
      - ../apps/server:/app
      - server_node_modules_local:/app/node_modules
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://streamassist:streamassist@db:5432/streamassist
      ADMIN_EMAILS: admin@local.streamassist
      WORDLE_JWT_SECRET: local-docker-dev-secret-min-16-chars
      AUTH_JWT_SECRET: local-docker-dev-secret-min-16-chars
      WORDLE_CLIENT_ORIGIN: http://localhost:5173
      # Must match Twitch Developer Console → OAuth Redirect URLs (localhost API, published :3000).
      TWITCH_AUTH_REDIRECT_URI: http://localhost:3000/api/auth/twitch/callback
      # Set in `docker/.env` (same folder as this compose file) or export before `docker compose`:
      #   TWITCH_CLIENT_ID=...
      #   TWITCH_CLIENT_SECRET=...
      TWITCH_CLIENT_ID: ${TWITCH_CLIENT_ID:-}
      TWITCH_CLIENT_SECRET: ${TWITCH_CLIENT_SECRET:-}
      MEDIASOUP_ANNOUNCED_ADDRESS: 127.0.0.1
      MEDIASOUP_RTC_MIN_PORT: "52000"
      MEDIASOUP_RTC_MAX_PORT: "52199"
    command: npm run dev

volumes:
  pgdata_local:
  server_node_modules_local:
