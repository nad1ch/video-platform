# Default: API + mediasoup ports only.
# With TURN: docker compose --profile turn up
# Then set ICE_SERVERS_JSON or TURN_* on the server so browsers use coturn (see apps/server/env.example).
#
# Windows + Docker Desktop: binding/publishing a huge UDP range sometimes fails; use
# docker-compose.local.example.yml (narrow RTC ports + matching MEDIASOUP_RTC_*).

services:
  server:
    build: ../apps/server
    container_name: mediasoup-server
    ports:
      - "3000:3000"
      - "40000-49999:40000-49999/udp"
    volumes:
      - ../apps/server:/app
      - /app/node_modules
    environment:
      NODE_ENV: development
      # Browsers must reach mediasoup ICE on the host — not the container’s private IP.
      # Use your LAN IP if the SPA is opened as http://192.168.x.x:5173 (and match VITE_SIGNALING_URL).
      MEDIASOUP_ANNOUNCED_ADDRESS: 127.0.0.1
      # Must match published UDP range above and apps/server mediasoup createWorker.
      MEDIASOUP_RTC_MIN_PORT: "40000"
      MEDIASOUP_RTC_MAX_PORT: "49999"
      # Local Twitch OAuth callback on the published API port (register same URL in Twitch console).
      TWITCH_AUTH_REDIRECT_URI: http://localhost:3000/api/auth/twitch/callback
      TWITCH_CLIENT_ID: ${TWITCH_CLIENT_ID:-}
      TWITCH_CLIENT_SECRET: ${TWITCH_CLIENT_SECRET:-}
      # Optional TURN/STUN for browsers (see docker/.env.example). Browsers run on the HOST — use
      # 127.0.0.1 or LAN IP, not the Docker service name `coturn`.
      ICE_SERVERS_JSON: ${ICE_SERVERS_JSON:-}
    command: npm run dev

  coturn:
    profiles: ["turn"]
    image: coturn/coturn:4.6.2
    container_name: video-platform-coturn
    ports:
      - "3478:3478/udp"
      - "3478:3478/tcp"
      - "5349:5349/tcp"
      - "49160-49200:49160-49200/udp"
    command:
      - -n
      - --log-file=stdout
      - --listening-port=3478
      - --tls-listening-port=5349
      - --min-port=49160
      - --max-port=49200
      - --fingerprint
      - --lt-cred-mech
      - --user=webrtc:change-me
      - --realm=video-platform
      - --no-cli
      # Set on real deploy (public IP or Docker host): --external-ip=203.0.113.10
